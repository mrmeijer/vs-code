<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Desk Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="background"></div>

<div class="container">
    <div class="card">

        <div class="header">
            <div class="logo">🎫</div>
            <h1>Service Desk</h1>
            <p>Create a support request</p>
        </div>

        <form id="ticketForm">

            <div class="form-group">
                <label>Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Your full name"
                    required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="name@company.com"
                    required>
            </div>

            <div class="form-group">
                <label>Priority</label>
                <select id="priority">
                    <option>Low</option>
                    <option selected>Medium</option>
                    <option>High</option>
                    <option>Critical</option>
                </select>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option>Hardware</option>
                    <option>Software</option>
                    <option>Access Request</option>
                    <option>Network</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Issue Description</label>
                <textarea
                    id="description"
                    rows="6"
                    placeholder="Describe your issue..."
                    required></textarea>
            </div>

            <button type="submit">
                Submit Ticket
            </button>

        </form>

        <div id="message"></div>

    </div>
</div>

<script src="app.js"></script>

</body>
</html>
